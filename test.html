<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Table</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Archivo', sans-serif;
        }
        .font-public {
            font-family: 'Public Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 p-4 md:p-8">
    
    <!-- Trigger button (example) -->
<button onclick="openModal()" class="px-4 h-10 bg-green-600 text-white rounded-md text-sm font-semibold">
  Add Category
</button>

<!-- Overlay -->
<div id="modalOverlay"
     class="fixed inset-0 bg-black/40 flex items-center justify-center p-4 opacity-0 invisible transition-opacity duration-200">

  <!-- Modal -->
  <div id="modalBox"
       class="w-full max-w-md bg-white rounded-xl shadow-lg p-6 flex flex-col gap-6
              scale-95 opacity-0 transition-all duration-200">

    <!-- Header -->
    <div class="flex justify-between items-center">
      <h2 class="text-xl font-bold text-gray-900">Add New Category</h2>

      <button onclick="closeModal()" class="text-gray-500 hover:text-black text-xl">
        ✕
      </button>
    </div>

    <!-- Inputs -->
    <div class="flex flex-col gap-4">

      <input
        type="text"
        placeholder="Category name"
        class="w-full px-3.5 py-2.5 border border-gray-200 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
      />

      <textarea
        rows="3"
        placeholder="Description (optional)"
        class="w-full px-3.5 py-2.5 border border-gray-200 rounded-md text-sm resize-none focus:outline-none focus:ring-2 focus:ring-green-500"
      ></textarea>

    </div>

    <!-- Actions -->
    <div class="flex justify-end gap-2">

      <button onclick="closeModal()"
        class="px-4 h-10 border border-gray-300 rounded-md text-sm font-semibold hover:bg-gray-50">
        Cancel
      </button>

      <button class="px-5 h-10 bg-green-600 text-white rounded-md text-sm font-semibold hover:bg-green-700">
        Save
      </button>

    </div>

  </div>
</div>

<script>
  const overlay = document.getElementById("modalOverlay");
  const modal = document.getElementById("modalBox");

  function openModal() {
    overlay.classList.remove("opacity-0", "invisible");
    modal.classList.remove("scale-95", "opacity-0");

    overlay.classList.add("opacity-100", "visible");
    modal.classList.add("scale-100", "opacity-100");
  }

  function closeModal() {
    overlay.classList.add("opacity-0");
    modal.classList.add("scale-95", "opacity-0");

    setTimeout(() => {
      overlay.classList.add("invisible");
    }, 200);
  }

  // Click outside to close
  overlay.addEventListener("click", (e) => {
    if (e.target === overlay) {
      closeModal();
    }
  });

  // ESC key close
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeModal();
  });
</script>

</body>
</html>
